# Hugo Site Configuration
baseURL = "https://www.haff.tech"
languageCode = "en-us"
title = "Drew DeNardo"
theme = "careercanvas"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

[languages]
  [languages.en]
    contentDir = "content/en"
    languageName = "English"
    weight = 1
    [languages.en.params]
      tagline = "Deeply technical. People-first."
      hero_description = "Strategic technology leader with more than twelve years of executive leadership. I have decades of managerial experience building exceptionally high-performing teams and products for startups and Fortune 50 companies. I am a people-first leader who is also deeply technical and hands-on."
      hero_location = "Philadelphia, PA"
      resume_url = "/files/Drew-DeNardo-resume.pdf"
      collab_tags = [
        "Individual, Team, & Enterprise AI adoption",
        "Organizational Leadership",
        "Developing Leaders",
        "Technology Transformations",
        "Delivering Extraordinary Business Value"
      ]

[build]
  writeStats = true

[params]
name = "Drew DeNardo"
firstName = "Drew"
lastName = "DeNardo"
email = "ddenardo@haff.tech"
profile_image = "/images/headshot.jpeg"
author = "Drew DeNardo"

og_image = "images/headshot.jpeg"

description = "Strategic technology leader with decades of experience building high-performing teams at startups and Fortune 50 companies."

linkedin_url = "https://www.linkedin.com/in/drewdenardo/"
linkedin_text = "linkedin.com/in/drewdenardo"
github_url = "https://github.com/dd-haff"
github_text = "github.com/dd-haff"

calendly_url = "https://calendar.app.google/qyUwsJaivc3CEKxF7"
calendly_height = "700px"

copyright = "Drew DeNardo"


resume_url_en = "/files/Drew-DeNardo-resume.pdf"
resume_label = "View Resume"

# Form and Pexels: set in config or config.local.toml. CI: HUGO_PARAMS_FORMSPREEENDPOINT, HUGO_PARAMS_PEXELSAPIKEY (no underscores)
formspreeendpoint = "https://formspree.io/f/xanbvqle"
pexelsapikey = "JSREPwqKtHQMKLKokmwlKcs0io6VTKYF3Iu6txIoGcZuf4GgmGofYv3B"

[[params.social]]
icon = "linkedin-in"
url = "https://www.linkedin.com/in/drewdenardo/"

[[params.social]]
icon = "github"
url = "https://github.com/dd-haff"

sectionPagesMenu = 'main'


[taxonomies]
  tag = "tags"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "monokai"

[server]
  [[server.headers]]
    for = "/**/*.css"
    [server.headers.values]
      Content-Type = "text/css"

